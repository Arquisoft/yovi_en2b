services:
  mariadb:
    image: mariadb:11.4
    container_name: mariadb
    environment:
      MYSQL_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MYSQL_DATABASE: users_db
      MYSQL_USER: ${MARIADB_USER}
      MYSQL_PASSWORD: ${MARIADB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./users/schema.sql:/docker-entrypoint-initdb.d/1.sql
      - ./game/schema.sql:/docker-entrypoint-initdb.d/2.sql
    networks:
      - monitor-net
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    restart: unless-stopped

  users:
    build: ./users
    container_name: users
    image: ghcr.io/arquisoft/yovi_en2b-users:latest
    ports:
      - "3000:3000"
    environment:
      APP_ENV: ${APP_ENV:-production}
      PORT: 3000
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: users_db
      DB_USER: ${MARIADB_USER}
      DB_PASSWORD: ${MARIADB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      PUBLIC_URL: ${VITE_USERS_API_URL}
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - monitor-net
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:3000/health || wget --no-verbose --tries=1 --spider http://localhost:3000/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  webapp:
    build:
      context: .
      dockerfile: webapp/Dockerfile
    container_name: webapp
    image: ghcr.io/arquisoft/yovi_en2b-webapp:latest
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_ENV: ${APP_ENV:-production}
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      users:
        condition: service_healthy
      game:
        condition: service_healthy
    networks:
      - monitor-net

  game:
    build: ./game
    container_name: game
    image: ghcr.io/arquisoft/yovi_en2b-game:latest
    ports:
      - "5000:5000"
    environment:
      APP_ENV: ${APP_ENV:-production}
      PORT: 5000
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: users_db
      DB_USER: ${MARIADB_USER}
      DB_PASSWORD: ${MARIADB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      PUBLIC_URL: ${VITE_GAME_API_URL}
      USERS_PUBLIC_URL: ${VITE_USERS_API_URL}
      RUST_INTERNAL_URL: http://gamey:4000
    depends_on:
      mariadb:
        condition: service_healthy
      users:
        condition: service_healthy
    networks:
      - monitor-net
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:5000/health || wget --no-verbose --tries=1 --spider http://localhost:5000/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  gamey:
    build: ./gamey
    container_name: gamey
    image: ghcr.io/arquisoft/yovi_en2b-gamey:latest
    ports:
      - "4000:4000"
    networks:
      - monitor-net

  # ── Interop service ──────────────────────────────────────────────────────────
  # Bridges external bot clients (YEN notation) to the Rust gamey engine.
  # Exposes POST /games/play and is reachable inside the cluster at
  # http://interop:3001 or from the host at http://localhost:3001.
  interop:
    build: ./interop
    container_name: interop
    image: ghcr.io/arquisoft/yovi_en2b-interop:latest
    ports:
      - "3001:3001"
    environment:
      WEBAPP_PORT: 3001
      # Must match the gamey service name on monitor-net
      RUST_INTERNAL_URL: http://gamey:4000
    depends_on:
      gamey:
        condition: service_started
    networks:
      - monitor-net
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:3001/health || wget --no-verbose --tries=1 --spider http://localhost:3001/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    restart: unless-stopped

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./users/monitoring/prometheus:/etc/prometheus
    networks:
      - monitor-net

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "9091:3000"
    volumes:
      - ./users/monitoring/grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_LOG_LEVEL=error
      - GF_LOG_MODE=console
    networks:
      - monitor-net

networks:
  monitor-net:
    driver: bridge

volumes:
  mariadb-data:
    driver: local