name: Build

on:
  push:
    branches:
    - master
  pull_request:
    types: [ opened, synchronize, reopened ]

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:11.4
        env:
          MYSQL_ROOT_PASSWORD: test_password
          MYSQL_DATABASE: users_db
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_password
        ports:
        - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized" --health-interval=10s --health-timeout=5s --health-retries=10

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        components: rustfmt, clippy

    - uses: actions/setup-node@v4
      with:
        node-version: 22

    - run: npm --prefix users ci
    - run: npm --prefix webapp ci
    - run: npm --prefix game ci
    - run: npm --prefix interop ci

    - name: Run users tests with coverage
      run: npm --prefix users run test:coverage:ci
      env:
        DB_HOST: 127.0.0.1
        DB_PORT: 3306
        DB_NAME: users_db
        DB_USER: test_user
        DB_PASSWORD: test_password

    - name: Run webapp tests with coverage
      run: npm --prefix webapp run test:coverage:ci

    - name: Run game tests with coverage
      run: npm --prefix game run test:coverage:ci
      env:
        DB_HOST: 127.0.0.1
        DB_PORT: 3306
        DB_NAME: users_db
        DB_USER: test_user
        DB_PASSWORD: test_password

    - name: Run interop tests with coverage
      run: npm --prefix interop run test:coverage:ci

    - name: Install cargo-llvm-cov
      run: cargo install cargo-llvm-cov --locked

    - name: Generate gamey code coverage
      run: cd gamey && cargo llvm-cov --lcov --output-path lcov.info

    - name: Normalize Rust coverage paths
      run: |
        sed -i "s|SF:${GITHUB_WORKSPACE}/|SF:|g" gamey/lcov.info
        grep '^SF:' gamey/lcov.info | head

    - name: Analyze with SonarQube
      uses: SonarSource/sonarqube-scan-action@master
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
