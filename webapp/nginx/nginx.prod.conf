resolver 127.0.0.11 ipv6=off;

upstream users   { server users:3000; }
upstream game    { server game:5000; }
upstream gamey   { server gamey:4000; }
upstream interop { server interop:3001; }
upstream prometheus { server prometheus:9090; }
upstream grafana { server grafana:3000; }

# SECURITY headers (global)
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# BLOCK invalid subdomains
server {
    listen 443 ssl default_server;
    listen 80 default_server;
    server_name _;

    ssl_certificate /etc/letsencrypt/live/micrati.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/micrati.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    return 444;
}

# SPA -> https://micrati.com
server {
    listen 443 ssl;
    http2 on;
    server_name micrati.com www.micrati.com;

    ssl_certificate /etc/letsencrypt/live/micrati.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/micrati.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
    }
}

# API -> https://api.micrati.com
server {
    listen 443 ssl;
    http2 on;
    server_name api.micrati.com;

    ssl_certificate /etc/letsencrypt/live/micrati.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/micrati.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    
    # CORS
    add_header "Access-Control-Allow-Origin" "https://micrati.com" always;
    add_header "Access-Control-Allow-Methods" "GET,POST,PUT,DELETE,OPTIONS,PATCH" always;
    add_header "Access-Control-Allow-Headers" "Content-Type,Authorization" always;
    add_header "Access-Control-Allow-Credentials" "true" always;
    
    location /users/ {
        if ($request_method = 'OPTIONS') { return 204; }
        proxy_pass http://users/;
        include /etc/nginx/snippets/proxy-headers.conf;
        proxy_redirect / /users/;
        proxy_redirect http:// /users/;
    }

    location /game/ {
        if ($request_method = 'OPTIONS') { return 204; }
        proxy_pass http://game/;
        include /etc/nginx/snippets/proxy-headers.conf;
        proxy_redirect / /game/;
        proxy_redirect http:// /game/;
    }

    location /gamey/ {
        if ($request_method = 'OPTIONS') { return 204; }
        proxy_pass http://gamey/;
        include /etc/nginx/snippets/proxy-headers.conf;
        proxy_redirect / /gamey/;
        proxy_redirect http:// /gamey/;
    }

    location /interop/ {
        if ($request_method = 'OPTIONS') { return 204; }
        proxy_pass http://interop/;
        include /etc/nginx/snippets/proxy-headers.conf;
        proxy_redirect / /interop/;
        proxy_redirect http:// /interop/;
    }
}

# Monitoring -> https://monitoring.micrati.com
server {
    listen 443 ssl;
    http2 on;
    server_name monitoring.micrati.com;

    ssl_certificate /etc/letsencrypt/live/micrati.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/micrati.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    
    location /prometheus/ {
        proxy_pass http://prometheus/;
        include /etc/nginx/snippets/proxy-headers.conf;
        proxy_redirect / /prometheus/;
        proxy_redirect http:// /prometheus/;
    }
    
    location /grafana/ {
        proxy_pass http://grafana;
        include /etc/nginx/snippets/proxy-headers.conf;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
